spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bolsa_empleo}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.cv.upload-dir=${CV_UPLOAD_DIR:./uploads/cv}

app.jwt.secret=${JWT_SECRET:BolsaEmpleoSecretKeyEIF209Programacion4UNACosta2026!}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

server.port=${PORT:8080}